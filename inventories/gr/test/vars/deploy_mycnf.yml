# --- ans_ prefixed (templated values) ---
ans_mycnf_template: "my.cnf-8.4.j2"
ans_innodb_buffer_pool_size: "4G"
ans_default_time_zone: "+00:00"
ans_sql_generate_invisible_primary_key: "ON"
ans_large_pages: "OFF"
ans_innodb_io_capacity: 3000
ans_innodb_io_capacity_max: 6000
ans_innodb_buffer_pool_instances: 8
ans_innodb_log_buffer_size: "64M"
ans_innodb_redo_log_capacity: "8G"
ans_mysql_data_dir: "/opt/mysql"
ans_mysql_log_bin_dir: "/opt/mysql/data/binlog"
ans_mysql_relay_log_dir: "/opt/mysql/data/relaylog"
ans_innodb_log_group_home_dir: "/opt/mysql/data/db"

