---
mysql_params:
  - name: audit_log
    value: "FORCE_PLUS_PERMANENT"
    state: disabled
  - name: audit_log_file
    value: "/opt/mysql/audit/audit.log"
    state: disabled
  - name: audit_log_format
    value: "JSON"                      # <-- audit kept in JSON format
    state: disabled
  - name: audit_log_compression
    value: "GZIP"
    state: disabled
  - name: audit_log_rotate_on_size
    value: "128K"
    state: disabled
  - name: audit_log_flush
    value: "off"
    state: disabled
  - name: audit_log_buffer_size
    value: "16K"
    state: disabled

