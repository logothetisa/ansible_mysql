---
- name: Deploy my.cnf template to MySQL server(s)
  hosts: "{{ target }}"
  become: true
  gather_facts: true   # needed for ansible_managed header + backup timestamp
  roles:
    - common           # if the task file notifies handlers like 'restart mysqld'
  tasks:
    - name: Include my.cnf deployment tasks
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/deploy_mycnf_tasks.yml"
