---
# =============================================================================
# Initialize a freshly-installed MySQL 8.4.x Commercial instance
# (Automates the manual "Actions as mysql O/S user" runbook)
#
# Play default identity = mysql O/S user (per the runbook heading).
# Tasks that touch systemd override to root.
#
# NOTE: Enabling thread_pool / audit parameters in my.cnf is handled
#       separately via mysql_manage_params.yml, e.g.:
#         ansible-playbook playbooks/mysql_manage_params.yml -e target=... \
#             -e @vars/enable_thread_pool.yml
#         ansible-playbook playbooks/mysql_manage_params.yml -e target=... \
#             -e @vars/enable_audit_log.yml
#
# Usage:
#   ansible-playbook playbooks/mysql_initialize_instance.yml \
#       -i inventories/gr/test-2/hosts -e target=mysql_dev --ask-vault-pass
# =============================================================================
- name: Initialize MySQL 8.4.x Commercial instance
  hosts: "{{ target }}"
  become: true
  become_user: "{{ mysql_user }}"      # default identity = mysql O/S user
  gather_facts: true

  roles:
    - common

  tasks:
    # =========================================================================
    # STEP 0 — Pre-flight: refuse to run against an already-initialized instance
    # =========================================================================
    - name: Check whether mysqld service is currently active
      ansible.builtin.systemd:
        name: mysqld
      register: mysqld_service_state
      failed_when: false

    - name: Check whether the datadir already contains data
      ansible.builtin.stat:
        path: "{{ innodb_log_group_home_dir }}/mysql"
      register: mysql_datadir_state

    - name: Abort if mysqld is running or the datadir is not empty
      ansible.builtin.assert:
        that:
          - (mysqld_service_state.status.ActiveState | default('inactive')) != 'active'
          - not mysql_datadir_state.stat.exists
        fail_msg: >-
          Refusing to run: mysqld ActiveState="{{ mysqld_service_state.status.ActiveState | default('unknown') }}",
          datadir "{{ innodb_log_group_home_dir }}/mysql" exists={{ mysql_datadir_state.stat.exists }}.
          This playbook only initializes a fresh, empty instance — stop mysqld and clear the datadir first if a
          re-initialization is genuinely intended.
        success_msg: "Pre-flight checks passed: mysqld is not active and the datadir is empty."

    # =========================================================================
    # STEP 1 — Initialize empty datadir (insecure), then start mysqld
    # =========================================================================
    - name: Check whether the datadir already contains data
      ansible.builtin.stat:
        path: "{{ innodb_log_group_home_dir }}/mysql"
      register: mysql_datadir_state

    - name: Initialize empty MySQL datadir (insecure)
      ansible.builtin.command:
        cmd: "mysqld --initialize-insecure --user={{ mysql_user }}"
      when: not mysql_datadir_state.stat.exists
      register: mysqld_init
      changed_when: mysqld_init.rc == 0

    - name: Report datadir already initialized
      ansible.builtin.debug:
        msg: "Datadir already initialized on {{ inventory_hostname }} — skipping initialize."
      when: mysql_datadir_state.stat.exists

    - name: Start mysqld service
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/start_mysqld_service_task.yml"
      vars:
        ansible_become_user: root       # systemd must run as root

    # =========================================================================
    # STEP 2 — Create root@%, grant privileges, drop root@localhost
    # (fresh --initialize-insecure leaves root@localhost with NO password,
    #  so we bootstrap via the local socket with an empty password first)
    # =========================================================================
    - name: Ensure global read_only is off for bootstrap
      ansible.builtin.command:
        argv:
          - mysql
#          - "--socket={{ mysql_socket }}"
          - "--user=root"
          - "--execute=SET @@global.read_only = 0"
      environment:
        MYSQL_PWD: ""            # fresh --initialize-insecure -> empty root password
      changed_when: false

    - name: Create root@'%' and grant privileges
      ansible.builtin.command:
        argv:
          - mysql
#          - "--socket={{ mysql_socket }}"
          - "--user=root"
          - >-
            --execute=CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED BY '{{ vault_mysql_password }}';
            GRANT ALL ON *.* TO 'root'@'%' WITH GRANT OPTION;
            GRANT PROXY ON ''@'' TO 'root'@'%' WITH GRANT OPTION;
      environment:
        MYSQL_PWD: ""
      register: create_root_user
      changed_when: create_root_user.rc == 0
      no_log: false

    - name: Drop the insecure root@'localhost' account
      ansible.builtin.command:
        argv:
          - mysql
#          - "--socket={{ mysql_socket }}"
          - "--user=root"
          - "--execute=DROP USER IF EXISTS 'root'@'localhost'"
      environment:
        MYSQL_PWD: ""
      register: drop_root_localhost
      changed_when: drop_root_localhost.rc == 0
      no_log: false

    # =========================================================================
    # STEP 3 — Install clone plugin
    # =========================================================================
    - name: Install clone plugin
      ansible.builtin.command:
        argv:
          - mysql
          - "--user={{ vault_mysql_user }}"
          - "--execute=INSTALL PLUGIN clone SONAME 'mysql_clone.so'"
      environment:
        MYSQL_PWD: "{{ vault_mysql_password }}"
      register: clone_plugin
      failed_when:
        - clone_plugin.rc != 0
        - "'already' not in (clone_plugin.stderr | default('') | lower)"
      changed_when: clone_plugin.rc == 0
      no_log: false

    # =========================================================================
    # STEP 4 — Install enterprise audit plugin
    # =========================================================================
    - name: Install audit_log_filter via mysql CLI 'source'
      ansible.builtin.command:
        argv:
          - mysql
          - "--user={{ vault_mysql_user }}"
          - "--execute=source {{ audit_log_filter_path }}"
          - "mysql"
      environment:
        MYSQL_PWD: "{{ vault_mysql_password }}"
      register: audit_source
      changed_when: audit_source.rc == 0
      no_log: false


    # =========================================================================
    # STEP 5 — Load the Time Zone tables
    # =========================================================================
    - name: Load Time Zone tables from {{ mysql_zoneinfo_dir }}
      ansible.builtin.shell:
        cmd: >
          mysql_tzinfo_to_sql {{ mysql_zoneinfo_path }}
          | mysql --user={{ vault_mysql_user }} mysql
      environment:
        MYSQL_PWD: "{{ vault_mysql_password }}"
      register: tzload
      changed_when: tzload.rc == 0
      failed_when: tzload.rc != 0
      no_log: false

    # =========================================================================
    # STEP 6 — Install password validation component
    # =========================================================================
    - name: Install validate_password component
      ansible.builtin.command:
        argv:
          - mysql
          - "--user={{ vault_mysql_user }}"
          - "--execute=INSTALL COMPONENT 'file://component_validate_password'"
      environment:
        MYSQL_PWD: "{{ vault_mysql_password }}"
      register: validate_pw_component
      failed_when:
        - validate_pw_component.rc != 0
        - "'already exists' not in (validate_pw_component.stderr | default('') | lower)"
      changed_when: validate_pw_component.rc == 0
      no_log: false

    # =========================================================================
    # STEP 7 — Enable MySQL Shell history persistence
    # =========================================================================
    - name: Enable MySQL Shell history autosave
      ansible.builtin.command:
        cmd: >-
          mysqlsh {{ vault_mysql_user }}@{{ ansible_hostname }} --js
          --password={{ vault_mysql_password }}
          --execute="shell.options.setPersist('history.autoSave', true)"
      register: mysqlsh_history
      changed_when: mysqlsh_history.rc == 0
      failed_when: mysqlsh_history.rc != 0
      no_log: false

    # =========================================================================
    # STEP 8 — Verification steps (kept as reusable task file)
    # =========================================================================
   # - name: Verify plugins, components, keyring and jemalloc
   #   ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/mysql_verify_initialization_task.yml"

  post_tasks:
    - name: Initialization complete
      ansible.builtin.debug:
        msg: "✅ MySQL instance initialized on {{ inventory_hostname }}."