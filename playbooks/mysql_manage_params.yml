---
- name: Manage parameters in my.cnf (add / modify / disable / remove)
  hosts: "{{ target }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Fail early if no parameters were provided
      ansible.builtin.assert:
        that:
          - mysql_params is defined
          - mysql_params | length > 0
        fail_msg: "No parameters supplied. Pass -e @vars/...yml"

    - name: Check that my.cnf exists
      ansible.builtin.stat:
        path: "{{ mysql_cnf_path }}"
      register: mycnf_stat

    - name: Fail if my.cnf is missing
      ansible.builtin.fail:
        msg: "{{ mysql_cnf_path }} does not exist."
      when: not mycnf_stat.stat.exists

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ mysql_cnf_backup_dir }}"
        state: directory
        owner: mysql
        group: mysql
        mode: "0700"
      check_mode: false

    - name: Backup current my.cnf before modification
      ansible.builtin.copy:
        src: "{{ mysql_cnf_path }}"
        dest: "{{ mysql_cnf_backup_dir }}/my.cnf.{{ ansible_date_time.iso8601_basic_short }}.bak"
        remote_src: true
        owner: mysql
        group: mysql
        mode: "0600"

    # ---------- ENABLED: uncomment ----------
    - name: "ENABLED - uncomment if commented - it does NOT change values"
      ansible.builtin.replace:
        path: "{{ mysql_cnf_path }}"
        regexp: '^(\s*)#\s*({{ item.name | regex_escape }}\s*=.*)$'
        replace: '\1\2'
      loop: "{{ mysql_params | selectattr('state','undefined') | list
                + mysql_params | selectattr('state','defined') | selectattr('state', 'match', 'enabled') | list }}"
      loop_control:
        label: "{{ item.name }}"

    # ---------- DISABLED: comment out ----------
    - name: "DISABLED - comment out active line"
      ansible.builtin.replace:
        path: "{{ mysql_cnf_path }}"
        regexp: '^(\s*)(?!#)({{ item.name | regex_escape }}\s*=.*)$'
        replace: '\1#\2'
      loop: "{{ mysql_params | selectattr('state','defined') | selectattr('state','match','disabled') | list }}"
      loop_control:
        label: "{{ item.name }}"

    # ---------- PRESENT: add or if it exists but is commented out, uncomment and update it ----------
    - name: "PRESENT - add or update (enable if commented, after [mysqld])"
      ansible.builtin.lineinfile:
        path: "{{ mysql_cnf_path }}"
        regexp: '^\s*#?\s*{{ item.name | regex_escape }}\s*=.*$'
        line: "{{ item.name }}={{ item.value }}"
        insertafter: '^\[{{ mysql_section }}\]'
        owner: mysql
        group: mysql
        mode: "0600"
      loop: "{{ mysql_params | selectattr('state','undefined') | list
                + mysql_params | selectattr('state','defined') | selectattr('state','match','present') | list }}"
      loop_control:
        label: "{{ item.name }} = {{ item.value | default('') }}"

    # ---------- ABSENT: remove the line entirely ----------
    - name: "ABSENT - remove parameter line"
      ansible.builtin.lineinfile:
        path: "{{ mysql_cnf_path }}"
        regexp: '^\s*#?\s*{{ item.name | regex_escape }}\s*=.*$'
        state: absent
      loop: "{{ mysql_params | selectattr('state','defined') | selectattr('state','match','absent') | list }}"
      loop_control:
        label: "{{ item.name }}"

    # ---------- VALIDATE ----------
    - name: Validate my.cnf after changes
      ansible.builtin.command:
        cmd: "mysqld --defaults-file={{ mysql_cnf_path }} --validate-config"
      become_user: mysql
      register: mycnf_validate
      changed_when: false
      failed_when: mycnf_validate.rc != 0

    - name: Confirm validation passed
      ansible.builtin.debug:
        msg: "✅ my.cnf valid on {{ inventory_hostname }} after changes."

