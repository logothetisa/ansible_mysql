---
- name: Install and configure MySQL 8.4.x Commercial
  hosts: "{{ target }}"
  become: true                 # escalate to root (default become_user) for all tasks
  gather_facts: true

  roles: 
    - common

  pre_tasks:
    # =========================================================================
    # STEP 0 — Verify supported OS and version (fail fast otherwise)
    # =========================================================================
    - name: Verify OS is RedHat/CentOS/Oracle Linux (or compatible) and version >= 7
      ansible.builtin.assert:
        that:
          - ansible_os_family == "RedHat"
          - ansible_distribution_major_version | int >= 7
        fail_msg: >-
          UNSUPPORTED OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          (family: {{ ansible_os_family }}). This playbook requires a RedHat-compatible
          distribution (RHEL, CentOS, Rocky, AlmaLinux, Oracle Linux) with major
          version greater than 7. Aborting.
        success_msg: >-
          Supported OS detected: {{ ansible_distribution }}
          {{ ansible_distribution_major_version }} ({{ ansible_os_family }}).

  tasks:
    # =========================================================================
    # STEP 1 — Install required OS packages
    # =========================================================================
    - name: Install required OS packages
      ansible.builtin.package:
        name: "{{ os_packages }}"
        state: present

    # =========================================================================
    # STEP 2 — Disable swappiness
    # =========================================================================
    - name: Set vm.swappiness=1
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "1"
        state: present
        sysctl_file: /etc/sysctl.conf
        reload: true

    # =========================================================================
    # STEP 3 — Set user limits
    # =========================================================================
    - name: Configure security limits for mysql
      ansible.builtin.lineinfile:
        path: /etc/security/limits.conf
        line: "{{ item }}"
        insertbefore: '^# End of file'
        create: true
      loop:
        - "mysql soft nofile 1024000"
        - "mysql hard nofile 1024000"
        - "mysql soft nproc 10240"
        - "mysql hard nproc 10240"
        - "mysql soft memlock unlimited"
        - "mysql hard memlock unlimited"

    # =========================================================================
    # STEP 4 — Disable Transparent Huge Pages (THP)
    # =========================================================================
    - name: Add transparent_hugepage=never to GRUB cmdline
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        # Match the GRUB_CMDLINE_LINUX line that does NOT already contain the flag
        regexp: '^GRUB_CMDLINE_LINUX="(?!.*transparent_hugepage=never)(.*)"$'
        line: 'GRUB_CMDLINE_LINUX="\1 transparent_hugepage=never"'
        backrefs: true
      notify: 
         - regenerate grub
         - reboot required

    # =========================================================================
    # STEP 5 — Disable SELinux and firewalld
    # =========================================================================
    - name: Disable SELinux
      ansible.posix.selinux:
        state: disabled
      notify: reboot required

    - name: Stop and disable firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: stopped
        enabled: false
      ignore_errors: true

    # =========================================================================
    # STEP 6 — mysql user/group, directory structure, sudoers
    # =========================================================================
    - name: Create mysql group
      ansible.builtin.group:
        name: "{{ mysql_group }}"
        state: present

    - name: Create mysql user
      ansible.builtin.user:
        name: "{{ mysql_user }}"
        group: "{{ mysql_group }}"
        home: "{{ mysql_home }}"
        create_home: true
        password: "{{ 'mysql' | password_hash('sha512') }}"
        update_password: on_create     # ← only sets password when user is first created

    - name: Create MySQL directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ mysql_user }}"
        group: "{{ mysql_group }}"
        recurse: true
      loop: "{{ mysql_directories }}"

    - name: Configure sudoers for mysql systemctl operations
      ansible.builtin.copy:
        dest: /etc/sudoers.d/mysql
        owner: root
        group: root
        mode: "0440"
        validate: 'visudo -cf %s'
        content: |
          {% for action in ['start','stop','restart','reload','try-restart','status','enable','disable','is-active','is-enabled'] %}
          mysql ALL=(root) NOPASSWD: /usr/bin/systemctl {{ action }} mysqld
          {% endfor %}

    # =========================================================================
    # STEP 7 — Adjust mysqld.service resource limits
    # =========================================================================
    - name: Configure mysqld.service resource limits
      ansible.builtin.lineinfile:
        path: /lib/systemd/system/mysqld.service
        insertafter: '^\[Service\]'
        line: "{{ item }}"
        state: present
      loop:
        - "LimitAS=infinity"
        - "LimitRSS=infinity"
        - "LimitCORE=infinity"
        - "LimitNOFILE=1024000"
        - "LimitMEMLOCK=infinity"
      notify: daemon-reload

    # =========================================================================
    # STEP 8 — Enable jemalloc (version dependent)
    # =========================================================================
    - name: Enable jemalloc via LD_PRELOAD
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/mysql
        line: "LD_PRELOAD={{ jemalloc_lib_rhel8 if ansible_distribution_major_version | int >= 8 else jemalloc_lib_rhel7 }}"
        create: true
        owner: root
        group: root
        mode: "0644"
      notify: daemon-reload

    # =========================================================================
    # STEP 9 — Install keyring component for TDE encryption
    # =========================================================================
    - name: Create keyring component manifest file -> "mysqld.my"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/keyring_component_manifest_file_task.yml"

    - name: Create keyring component config file -> "component_keyring_encrypted_file.cnf"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/keyring_component_config_file_task.yml"

    # =========================================================================
    # STEP 10 — Deploy new my.cnf
    # =========================================================================
    - name: Deploy new my.cnf
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/deploy_mycnf_tasks.yml"
